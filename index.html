<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Southevents Finances</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">SE</div>
      <div>
        <div class="brand-title">SOUTHEVENTS</div>
        <div class="brand-sub">Gestion financière</div>
      </div>
    </div>
    <nav class="nav">
      <button class="navbtn on" data-page="dash">Dashboard</button>
      <button class="navbtn" data-page="events">Événements</button>
      <button class="navbtn" data-page="add">Créer événement</button>
      <button class="navbtn" data-page="funds">Fonds commun</button>
      <button class="navbtn" data-page="history">Historique</button>
      <button class="navbtn" data-page="settings">Paramètres</button>
    </nav>
  </aside>
  <main class="main">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">Dashboard</h1>
        <p id="pageSub">Vue d’ensemble de vos événements</p>
      </div>
      <div class="actions">
        <button id="seedBtn" class="btn secondary">Charger démo</button>
        <button id="resetBtn" class="btn ghost">Réinitialiser</button>
      </div>
    </header>

    <section id="page-dash" class="page on">
      <div class="kpis" id="kpis"></div>
      <div class="card">
        <div class="card-title">Par événement</div>
        <div class="table-wrap"><table><thead><tr><th>Événement</th><th>Date</th><th>Revenus</th><th>Dépenses</th><th>Solde</th></tr></thead><tbody id="dashTable"></tbody></table></div>
      </div>
    </section>

    <section id="page-events" class="page">
      <div class="card">
        <div class="card-title">Événements</div>
        <div id="eventsList" class="stack"></div>
      </div>
    </section>

    <section id="page-add" class="page">
      <div class="card">
        <div class="card-title">Créer un événement</div>
        <form id="eventForm" class="form-grid">
          <input name="name" placeholder="Nom" required>
          <input name="date" type="date" required>
          <input name="place" placeholder="Lieu">
          <input name="ticketPrice" type="number" step="0.01" placeholder="Prix billet">
          <input name="objective" type="number" placeholder="Objectif billets">
          <textarea name="notes" placeholder="Notes"></textarea>
          <button class="btn primary" type="submit">Créer</button>
        </form>
      </div>
    </section>

    <section id="page-funds" class="page">
      <div class="kpis" id="fundKpis"></div>
      <div class="card">
        <div class="card-title">Mouvements du fonds commun</div>
        <div class="table-wrap"><table><thead><tr><th>Date</th><th>Type</th><th>Événement</th><th>Montant</th><th>Solde</th></tr></thead><tbody id="fundTable"></tbody></table></div>
      </div>
    </section>

    <section id="page-history" class="page">
      <div class="card">
        <div class="card-title">Historique</div>
        <div id="historyList" class="stack"></div>
      </div>
    </section>

    <section id="page-settings" class="page">
      <div class="card">
        <div class="card-title">Paramètres</div>
        <div class="form-grid">
          <label>Catégories dépenses<textarea id="expCats"></textarea></label>
          <label>Catégories revenus<textarea id="revCats"></textarea></label>
          <label>Payé par<textarea id="payers"></textarea></label>
          <button id="saveSettings" class="btn primary" type="button">Enregistrer</button>
        </div>
      </div>
    </section>
  </main>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-card">
    <div class="modal-head">
      <div id="modalTitle">Modal</div>
      <button id="closeModal" class="xbtn">×</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
